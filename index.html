<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f3f4f6}
.app{display:flex;height:100vh}
.sidebar{
width:240px;
background:#111827;
color:white;
padding:20px;
display:flex;
flex-direction:column;
gap:12px
}
.logo{
font-size:24px;
font-weight:bold;
margin-bottom:20px
}
button{
padding:14px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
font-size:14px;
text-align:left
}
button:hover{background:#374151}
button.active{background:#2563eb}
.content{flex:1}
iframe{
width:100%;
height:100vh;
border:none;
background:white
}
</style>
</head>
<body>

<div class="app">

<div class="sidebar">
<div class="logo">📊 Dashboard</div>

<button class="menu active" onclick="switchModule('fleet_dashboard_v4.html', this)">
⛽ Fleet Card
</button>

<button class="menu" onclick="switchModule('travel_dashboard.html', this)">
✈️ Travelling
</button>

<button class="menu" onclick="switchModule('AccomEx_v7.html', this)">
🏨 Accommodation
</button>

</div>

<div class="content">
<iframe id="frame" src="fleet_dashboard_v4.html"></iframe>
</div>

</div>

<script>
function switchModule(file, el){

document.getElementById('frame').src = file;

document.querySelectorAll('.menu').forEach(btn=>{
btn.classList.remove('active');
});

el.classList.add('active');

}
</script>

</body>
</html>
